<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ORIVÈA Workspace Login</title>
  <link rel="stylesheet" href="/css/dashboard.css">
</head>
<body class="auth-page">
  <main class="login-shell">
    <section class="login-card">
      <p class="eyebrow">ORIVÈA Workspace</p>
      <h1>Inloggen</h1>
      <p>Beheer orders, klantaanvragen, uploads en social content vanuit één rustige omgeving.</p>
      <form method="post" action="/login" class="form-stack">
        <label>Gebruikersnaam<input name="username" autocomplete="username" required></label>
        <label>Wachtwoord<input type="password" name="password" autocomplete="current-password" required></label>
        <button class="button button-primary" type="submit">Inloggen</button>
      </form>
    </section>
  </main>
</body>
</html>
